name: ci

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build engine, bots, and run rules tests
        run: python build.py --test

      - name: Smoke game (counter must eliminate rocky)
        shell: bash
        run: |
          BIN=build/arena
          [ "$RUNNER_OS" = "Windows" ] && BIN=build/arena.exe
          "$BIN" play counter rocky --seed 5 --json \
            | python -c "import json,sys; g=json.load(sys.stdin); assert g['winner']=='a' and g['reason']=='elimination', g; print('smoke OK:', g['turnsPlayed'], 'turns')"
